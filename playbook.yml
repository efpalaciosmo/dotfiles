---
# Run with: ansible-playbook playbook.yml -e dotfiles_profile=suse
# Makefile sets dotfiles_profile and optional --tags / check mode for dry-run.

- name: Dotfiles automation
  hosts: local
  connection: local
  gather_facts: true

  pre_tasks:
    - name: Require dotfiles_profile
      ansible.builtin.assert:
        that:
          - dotfiles_profile is defined
          - dotfiles_profile == 'suse'
        fail_msg: "Set -e dotfiles_profile=suse"
        quiet: true
      tags: [always]

    - name: Set backup stamp for dotfile conflicts
      ansible.builtin.set_fact:
        dotfiles_backup_stamp: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"
      tags: [always]

  tasks:
    - name: openSUSE workflow
      ansible.builtin.include_tasks: tasks/profile-suse.yml
      tags: [always]
