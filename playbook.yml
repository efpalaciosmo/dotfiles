---
# Run with: ansible-playbook playbook.yml -e dotfiles_profile=home|vm
# Makefile sets dotfiles_profile and optional --tags / check mode for dry-run.

- name: Dotfiles automation
  hosts: local
  connection: local
  gather_facts: true

  pre_tasks:
    - name: Require dotfiles_profile
      ansible.builtin.assert:
        that:
          - dotfiles_profile is defined
          - dotfiles_profile in ['home', 'vm']
        fail_msg: "Set -e dotfiles_profile=home or dotfiles_profile=vm"
      tags: [always]

    - name: Set backup stamp for dotfile conflicts
      ansible.builtin.set_fact:
        dotfiles_backup_stamp: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"
      tags: [always]

  tasks:
    - name: Home workflow
      ansible.builtin.include_tasks: tasks/profile-home.yml
      when: dotfiles_profile == 'home'
      tags: [always]

    - name: VM workflow
      ansible.builtin.include_tasks: tasks/profile-vm.yml
      when: dotfiles_profile == 'vm'
      tags: [always]
