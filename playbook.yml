---
- name: Portable dotfiles automation
  hosts: local
  connection: local
  gather_facts: true

  vars:
    dotfiles_profile: portable

  pre_tasks:
    - name: Set backup stamp for dotfile conflicts
      ansible.builtin.set_fact:
        dotfiles_backup_stamp: "{{ lookup('pipe', 'date +%Y%m%d-%H%M%S') }}"
      tags: [always]

  tasks:
    - name: Portable workflow
      ansible.builtin.include_tasks: tasks/profile-portable.yml
      tags: [always]
