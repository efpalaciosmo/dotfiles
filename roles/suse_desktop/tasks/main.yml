---
- name: openSUSE desktop bootstrap
  tags: [suse, desktop-suse]
  block:
    - name: Ensure desktop runtime directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "{{ ansible_facts.env.HOME }}/.config"
        - "{{ ansible_facts.env.HOME }}/Pictures"
        - "{{ ansible_facts.env.HOME }}/Pictures/Screenshots"

    - name: Enable system services used by the desktop
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
      become: true
      loop: "{{ suse_system_services }}"
      when: not ansible_check_mode
      failed_when: false

    - name: Enable user audio services
      ansible.builtin.systemd:
        name: "{{ item }}"
        enabled: true
        state: started
        scope: user
      loop: "{{ suse_user_services }}"
      when: not ansible_check_mode
      failed_when: false
