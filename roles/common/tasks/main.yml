---
# Detect dotfiles context (sets dotfiles_in_distrobox, dotfiles_is_ostree_host).
- name: Detect dotfiles context (Distrobox / ostree)
  ansible.builtin.import_tasks: "{{ playbook_dir }}/tasks/detect_context.yml"
  tags: [always]

- name: Warn if home profile is not running on Arch
  ansible.builtin.debug:
    msg: "Home profile now targets Arch Linux; detected {{ ansible_facts.distribution }}."
  when:
    - dotfiles_profile == 'home'
    - ansible_facts.distribution != 'Archlinux'
  tags: [always]

- name: Resolve python interpreter used for pip --user
  ansible.builtin.command:
    cmd: bash -lc 'command -v python3 || command -v python'
  register: _pip_python_which
  changed_when: false
  failed_when: _pip_python_which.rc != 0
  tags: [always]

- name: Set dotfiles_pip_python fact
  ansible.builtin.set_fact:
    dotfiles_pip_python: "{{ _pip_python_which.stdout | trim }}"
  tags: [always]

- name: Ensure user-local layout dirs
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ ansible_facts.env.HOME }}/.local/bin"
    - "{{ ansible_facts.env.HOME }}/.local/lib"
    - "{{ ansible_facts.env.HOME }}/.local/opt"
    - "{{ ansible_facts.env.HOME }}/.cache/dotfiles"
  tags: [always]

# --- PATH ----------------------------------------------------------------
# Ensure ~/.profile mentions ~/.local/bin. Shell-specific rc files source
# ~/.profile, and may be stown-managed symlinks back into this repository.
- name: Resolve PATH targets for this profile
  ansible.builtin.set_fact:
    _path_line: 'export PATH="$HOME/.local/bin:$PATH"'
    _profile_path: "{{ ansible_facts.env.HOME }}/.profile"
  tags: [always]

- name: Check ~/.profile for .local/bin
  ansible.builtin.command:
    cmd: grep -q '\.local/bin' "{{ _profile_path }}"
  register: _profile_has_local_bin
  changed_when: false
  failed_when: false
  tags: [always]

- name: Ensure PATH line in ~/.profile
  ansible.builtin.lineinfile:
    path: "{{ _profile_path }}"
    line: "{{ _path_line }}"
    create: true
    mode: '0644'
  when: _profile_has_local_bin.rc | default(1) != 0
  tags: [always]
