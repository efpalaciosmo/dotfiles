---
- name: Install SDKMAN
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://get.sdkman.io | bash -s -- -y
  args:
    executable: /bin/bash
    creates: "{{ ansible_facts.env.HOME }}/.sdkman/bin/sdkman-init.sh"
  environment:
    SDKMAN_DIR: "{{ ansible_facts.env.HOME }}/.sdkman"
  changed_when: true

- name: Resolve Java candidate id (SDKMAN list)
  ansible.builtin.shell: |
    set +u
    export SDKMAN_DIR="$HOME/.sdkman"
    source "$SDKMAN_DIR/bin/sdkman-init.sh"
    sdk list java 2>/dev/null | awk -v dist='{{ jdk_distribution }}' -v feat='{{ jdk_feature_version }}' '$NF ~ ("^" feat "[.\\-].*-" dist "$") {print $NF; exit}'
  args:
    executable: /bin/bash
  register: sdk_java_id
  changed_when: false
  failed_when: false

# Match languages.sh: fail if we cannot pick a JDK line from `sdk list java`.
- name: Require resolved SDKMAN Java identifier
  ansible.builtin.assert:
    that:
      - sdk_java_id.stdout | default('') | trim | length > 0
    fail_msg: >-
      Could not resolve a JDK {{ jdk_feature_version }}-{{ jdk_distribution }} candidate via SDKMAN
      (check jdk_feature_version / jdk_distribution, or network).
    quiet: true

- name: Install JDK via SDKMAN
  ansible.builtin.shell: |
    set +u
    export SDKMAN_DIR="$HOME/.sdkman"
    source "$SDKMAN_DIR/bin/sdkman-init.sh"
    yes n | sdk install java '{{ sdk_java_id.stdout | trim }}' || sdk install java '{{ sdk_java_id.stdout | trim }}' < /dev/null
  args:
    executable: /bin/bash
    creates: "{{ ansible_facts.env.HOME }}/.sdkman/candidates/java/{{ sdk_java_id.stdout | trim }}"
  register: sdk_java_install
  changed_when: sdk_java_install.rc == 0
  failed_when: sdk_java_install.rc != 0

- name: Set default Java in SDKMAN
  ansible.builtin.shell: |
    set +u
    export SDKMAN_DIR="$HOME/.sdkman"
    source "$SDKMAN_DIR/bin/sdkman-init.sh"
    sdk default java '{{ sdk_java_id.stdout | trim }}'
  args:
    executable: /bin/bash
  changed_when: true
  failed_when: false

- name: Symlink ~/.local/lib/jdk to SDKMAN current
  ansible.builtin.file:
    src: "{{ ansible_facts.env.HOME }}/.sdkman/candidates/java/current"
    dest: "{{ ansible_facts.env.HOME }}/.local/lib/jdk"
    state: link
    force: true
