---
- name: Check julia binary
  ansible.builtin.shell:
    cmd: command -v julia
  register: julia_which
  changed_when: false
  failed_when: false

- name: Install Julia via juliaup
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://install.julialang.org | sh -s -- --yes --default-channel release
  args:
    executable: /bin/bash
    creates: "{{ ansible_facts.env.HOME }}/.juliaup/bin/julia"
  when: julia_which.rc != 0
  changed_when: true
