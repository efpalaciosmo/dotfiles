---
- name: Query current Gradle version
  ansible.builtin.uri:
    url: https://services.gradle.org/versions/current
    return_content: true
  register: gradle_current
  failed_when: gradle_current.content is not search('version')

- name: Set Gradle version fact
  ansible.builtin.set_fact:
    gradle_dotfiles_version: "{{ (gradle_current.content | from_json).version }}"

- name: Paths for Gradle install
  ansible.builtin.set_fact:
    gradle_version_dir: "{{ ansible_env.HOME }}/.local/opt/gradle-{{ gradle_dotfiles_version }}"
    gradle_zip_cache: "{{ ansible_env.HOME }}/.cache/dotfiles/gradle/gradle-{{ gradle_dotfiles_version }}-bin.zip"

- name: Ensure Gradle cache directory exists
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.cache/dotfiles/gradle"
    state: directory
    mode: '0755'

- name: Download Gradle distribution
  ansible.builtin.get_url:
    url: "https://services.gradle.org/distributions/gradle-{{ gradle_dotfiles_version }}-bin.zip"
    dest: "{{ gradle_zip_cache }}"
    mode: '0644'
    force: false

- name: Expand Gradle into versioned directory
  ansible.builtin.unarchive:
    src: "{{ gradle_zip_cache }}"
    dest: "{{ ansible_env.HOME }}/.local/opt"
    remote_src: true
    creates: "{{ gradle_version_dir }}/bin/gradle"

- name: Marker for Gradle install
  ansible.builtin.file:
    path: "{{ gradle_version_dir }}/.dotfiles-installed"
    state: touch
    mode: '0644'
    modification_time: preserve
    access_time: preserve

- name: Symlink ~/.local/opt/gradle to versioned tree
  ansible.builtin.file:
    src: "{{ gradle_version_dir }}"
    dest: "{{ ansible_env.HOME }}/.local/opt/gradle"
    state: link
    force: true
