---
- name: Check uv binary
  ansible.builtin.shell:
    cmd: command -v uv
  register: uv_which
  changed_when: false
  failed_when: false
  environment:
    PATH: "{{ ansible_facts.env.HOME }}/.local/bin:{{ ansible_facts.env.PATH | default('') }}"

- name: Install uv (official installer)
  ansible.builtin.shell: |
    set -euo pipefail
    curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR="$HOME/.local/bin" sh -s -- --quiet
  args:
    executable: /bin/bash
    creates: "{{ ansible_facts.env.HOME }}/.local/bin/uv"
  when: uv_which.rc != 0
  changed_when: true
