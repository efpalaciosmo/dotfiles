---
- name: Check fnm binary
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.local/share/fnm/fnm"
  register: fnm_bin

- name: Install fnm (official installer, skip shell hooks)
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://fnm.vercel.app/install | bash -s -- --skip-shell
  args:
    creates: "{{ ansible_facts.env.HOME }}/.local/share/fnm/fnm"
  when: not fnm_bin.stat.exists | default(false)
  changed_when: true
