---
# Go via gvm — mirrors scripts/vm/languages.sh (install_go + ensure_gvm).
- name: Require git for gvm installer
  ansible.builtin.command:
    cmd: bash -lc 'command -v git'
  register: git_cmd
  changed_when: false
  failed_when: false

- name: Abort when git is missing
  ansible.builtin.assert:
    that:
      - git_cmd.rc == 0
    fail_msg: "git is required by gvm; run `make packages-vm` (or ensure vm_packages succeeds) before `make vm`."
    quiet: true

- name: Install gvm
  ansible.builtin.shell: |
    set -euo pipefail
    curl -fsSL https://raw.githubusercontent.com/moovweb/gvm/master/binscripts/gvm-installer | bash
  args:
    creates: "{{ ansible_facts.env.HOME }}/.gvm/scripts/gvm"
  environment:
    PATH: "/usr/bin:/bin:{{ ansible_facts.env.PATH | default('') }}"
  changed_when: true

# Same as languages.sh: `curl ... | head -n1 | sed 's/^go//'`
# (go.dev may append extra lines; uri/content parsing in Jinja has bitten us before.)
- name: Resolve latest Go version (text)
  ansible.builtin.shell: |
    set -euo pipefail
    if command -v curl >/dev/null 2>&1; then
      curl -fsSL https://go.dev/VERSION?m=text | head -n1 | sed 's/^go//'
    else
      wget -qO- https://go.dev/VERSION?m=text | head -n1 | sed 's/^go//'
    fi
  register: go_version_resolve
  changed_when: false
  retries: 4
  delay: 3
  until: go_version_resolve.rc == 0 and (go_version_resolve.stdout | trim | length > 0)

- name: Set Go version variables
  ansible.builtin.set_fact:
    go_dotfiles_version: "{{ go_version_resolve.stdout | trim | regex_replace('[\\r\\n]+$', '') }}"

- name: Validate resolved Go version
  ansible.builtin.assert:
    that:
      - go_dotfiles_version | length > 0
      - go_dotfiles_version is match('^[0-9][0-9A-Za-z.+~-]*$')
    fail_msg: "Could not parse Go version from go.dev/VERSION (first line)."
    quiet: true

- name: Set gvm package name
  ansible.builtin.set_fact:
    go_dotfiles_pkg: "go{{ go_dotfiles_version }}"

- name: Stat gvm Go tree
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.gvm/gos/{{ go_dotfiles_pkg }}"
  register: go_gos_stat

- name: Stat Go dotfiles marker
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.gvm/.dotfiles-installed-{{ go_dotfiles_pkg }}"
  register: go_marker_stat

- name: Set fact — install Go when marker or tree missing
  ansible.builtin.set_fact:
    go_needs_gvm_install: >-
      {{
        not (
          (go_marker_stat.stat.exists | default(false))
          and (go_gos_stat.stat.isdir | default(false))
        )
      }}

- name: Install Go with gvm (binary package when possible)
  ansible.builtin.shell: |
    set +u
    source "$HOME/.gvm/scripts/gvm"
    gvm install '{{ go_dotfiles_pkg }}' -B || gvm install '{{ go_dotfiles_pkg }}'
    gvm use '{{ go_dotfiles_pkg }}' --default
    touch "$HOME/.gvm/.dotfiles-installed-{{ go_dotfiles_pkg }}"
  when: go_needs_gvm_install | bool
  register: gvm_go_install
  changed_when: gvm_go_install.rc == 0
  failed_when: gvm_go_install.rc != 0

- name: Stat gvm Go tree (after install)
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.gvm/gos/{{ go_dotfiles_pkg }}"
  register: go_gos_final

- name: Assert gvm Go tree exists
  ansible.builtin.assert:
    that:
      - go_gos_final.stat.isdir | default(false)
    fail_msg: "gvm did not produce {{ ansible_facts.env.HOME }}/.gvm/gos/{{ go_dotfiles_pkg }}"
    quiet: true

- name: Symlink ~/.local/go to gvm tree
  ansible.builtin.file:
    src: "{{ ansible_facts.env.HOME }}/.gvm/gos/{{ go_dotfiles_pkg }}"
    dest: "{{ ansible_facts.env.HOME }}/.local/go"
    state: link
    force: true
