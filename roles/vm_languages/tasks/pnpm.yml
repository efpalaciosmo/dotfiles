---
- name: Check pnpm binary
  ansible.builtin.stat:
    path: "{{ ansible_facts.env.HOME }}/.local/share/pnpm/pnpm"
  register: pnpm_stat

- name: Install pnpm (official installer)
  ansible.builtin.shell: |
    set -euo pipefail
    export PNPM_HOME="$HOME/.local/share/pnpm"
    shell_bin="$(command -v bash || command -v sh)"
    export SHELL="$shell_bin"
    # pnpm installer may require ENV when SHELL is sh-like. Keep installer
    # edits out of stown-managed shell files; dotfiles set PNPM_HOME/PATH.
    export ENV="$HOME/.cache/dotfiles/pnpm-env"
    curl -fsSL https://get.pnpm.io/install.sh | "$shell_bin" -s -- -y
  args:
    executable: /bin/bash
    creates: "{{ ansible_facts.env.HOME }}/.local/share/pnpm/pnpm"
  when: not pnpm_stat.stat.exists | default(false)
  changed_when: true
