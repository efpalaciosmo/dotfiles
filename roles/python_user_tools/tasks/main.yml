---
- name: Check if stown is already available
  ansible.builtin.command:
    cmd: bash -lc 'command -v stown'
  environment:
    PATH: "{{ ansible_facts.env.HOME }}/.local/bin:{{ ansible_facts.env.PATH | default('') }}"
  register: stown_present
  check_mode: false
  changed_when: false
  failed_when: false

- name: Check if pip is available
  ansible.builtin.command:
    argv: ["{{ dotfiles_pip_python }}", "-m", "pip", "--version"]
  register: pip_check
  check_mode: false
  changed_when: false
  failed_when: pip_check.rc != 0
  when: stown_present.rc != 0

- name: Install stown (pip --user)
  ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/pip_user_install.yml"
  vars:
    pip_install_pkg: stown
  when:
    - not ansible_check_mode
    - stown_present.rc != 0

- name: Verify stown is on PATH
  ansible.builtin.command:
    cmd: bash -lc 'command -v stown'
  environment:
    PATH: "{{ ansible_facts.env.HOME }}/.local/bin:{{ ansible_facts.env.PATH | default('') }}"
  register: stown_verify
  when: not ansible_check_mode
  changed_when: false
  failed_when: stown_verify.rc != 0
