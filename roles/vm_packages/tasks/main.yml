---
- name: openSUSE packages
  tags: [suse, packages-suse]
  block:
    - name: Verify required commands are present
      ansible.builtin.shell:
        cmd: command -v "{{ item }}"
      loop:
        - bash
        - tar
        - python3
        - zypper
      changed_when: false

    - name: Verify curl or wget exists
      ansible.builtin.shell:
        cmd: command -v "{{ item }}"
      loop:
        - curl
        - wget
      register: suse_curl_wget
      changed_when: false
      failed_when: false

    - name: At least one downloader required
      ansible.builtin.assert:
        that:
          - suse_curl_wget.results | selectattr('rc', 'equalto', 0) | list | length > 0
        fail_msg: "Need curl or wget on openSUSE."
        quiet: true
      when: not ansible_check_mode

    - name: Refresh zypper metadata
      ansible.builtin.command:
        cmd: zypper --non-interactive refresh
      become: true
      when: not ansible_check_mode
      register: zypper_refresh
      changed_when: zypper_refresh.rc == 0
      failed_when: false

    - name: Install openSUSE package set
      ansible.builtin.command:
        cmd: >-
          zypper --non-interactive --gpg-auto-import-keys install
          --no-recommends {{ suse_packages_all | join(' ') }}
      become: true
      when: not ansible_check_mode
      register: zypper_install_suse
      changed_when: "'Nothing to do' not in (zypper_install_suse.stdout | default(''))"
      failed_when: zypper_install_suse.rc != 0

    - name: Verify packages with rpm (best-effort)
      ansible.builtin.command:
        cmd: rpm -q "{{ item }}"
      loop: "{{ suse_packages_all }}"
      register: rpm_q_suse
      when: not ansible_check_mode
      changed_when: false
      failed_when: false
