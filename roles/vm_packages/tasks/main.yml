---
- name: openSUSE packages
  tags: [suse, packages-suse]
  block:
    - name: Verify required commands are present
      ansible.builtin.shell:
        cmd: command -v "{{ item }}"
      loop:
        - bash
        - tar
        - python3
        - zypper
      changed_when: false

    - name: Verify curl or wget exists
      ansible.builtin.shell:
        cmd: command -v "{{ item }}"
      loop:
        - curl
        - wget
      register: suse_curl_wget
      changed_when: false
      failed_when: false

    - name: At least one downloader required
      ansible.builtin.assert:
        that:
          - suse_curl_wget.results | selectattr('rc', 'equalto', 0) | list | length > 0
        fail_msg: "Need curl or wget on openSUSE."
        quiet: true
      when: not ansible_check_mode

    - name: Install openSUSE package set
      community.general.zypper:
        name: "{{ suse_packages_all | unique | list }}"
        state: present
        auto_import_keys: false
        disable_recommends: true
        update_cache: true
      when: not ansible_check_mode
      become: true

    - name: Verify packages or capabilities with rpm (best-effort)
      ansible.builtin.command:
        argv:
          - rpm
          - -q
          - --whatprovides
          - "{{ item }}"
      loop: "{{ suse_packages_all | unique | list }}"
      register: rpm_q_suse
      when: not ansible_check_mode
      changed_when: false
      failed_when: false
