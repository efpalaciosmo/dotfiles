---
- name: Fedora packages (vm)
  tags: [vm, packages-vm]
  block:
    - name: Verify required commands are present
      ansible.builtin.shell:
        cmd: command -v "{{ item }}"
      loop:
        - bash
        - tar
        - python3
        - dnf
      changed_when: false

    - name: Verify curl or wget exists
      ansible.builtin.shell:
        cmd: command -v "{{ item }}"
      loop:
        - curl
        - wget
      register: vm_curl_wget
      changed_when: false
      failed_when: false

    - name: At least one downloader required (vm)
      ansible.builtin.assert:
        that:
          - vm_curl_wget.results | selectattr('rc', 'equalto', 0) | list | length > 0
        fail_msg: "Need curl or wget inside the container."

    - name: Refresh dnf cache
      ansible.builtin.command:
        cmd: dnf makecache --refresh
      become: true
      register: dnf_makecache
      changed_when: dnf_makecache.rc == 0
      failed_when: false

    - name: Install Fedora package set
      ansible.builtin.command:
        cmd: dnf -y install {{ vm_packages_all | join(' ') }}
      become: true
      register: dnf_install_vm
      changed_when: "'Nothing to do' not in (dnf_install_vm.stdout | default(''))"
      failed_when: dnf_install_vm.rc != 0

    - name: Verify packages with rpm (best-effort)
      ansible.builtin.command:
        cmd: rpm -q "{{ item }}"
      loop: "{{ vm_packages_all }}"
      register: rpm_q_vm
      changed_when: false
      failed_when: false
