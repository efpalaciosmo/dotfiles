---
- name: Context summary
  ansible.builtin.debug:
    msg:
      - "=== dotfiles doctor (ansible) ==="
      - "User={{ ansible_facts.user_id | default(ansible_facts.env.USER) }} HOME={{ ansible_facts.env.HOME }}"
      - "Distribution={{ ansible_facts.get('distribution', '?') }} {{ ansible_facts.get('distribution_version', '') }}"

- name: Critical commands availability
  ansible.builtin.shell: command -v "{{ item }}"
  args:
    executable: /bin/bash
  loop:
    - bash
    - tar
    - python3
  register: doctor_critical
  changed_when: false
  failed_when: false

- name: Show critical command paths
  ansible.builtin.debug:
    msg: "{{ item.item }} -> {{ item.stdout if item.rc == 0 else 'MISSING' }}"
  loop: "{{ doctor_critical.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: Optional commands
  ansible.builtin.shell: command -v "{{ item }}"
  args:
    executable: /bin/bash
  loop:
    - curl
    - wget
    - git
    - make
    - stown
    - zypper
    - pacman
    - niri
    - waybar
    - code-insiders
    - podman-compose
    - shellcheck
  register: doctor_optional
  changed_when: false
  failed_when: false

- name: Show optional command paths
  ansible.builtin.debug:
    msg: "{{ item.item }} -> {{ item.stdout if item.rc == 0 else 'MISSING' }}"
  loop: "{{ doctor_optional.results }}"
  loop_control:
    label: "{{ item.item }}"

- name: PATH contains ~/.local/bin
  ansible.builtin.debug:
    msg: >-
      {{ 'OK: ~/.local/bin in PATH'
         if (':' ~ ansible_facts.env.PATH ~ ':') is search(':' ~ ansible_facts.env.HOME ~ '/.local/bin:')
         else 'WARN: ~/.local/bin not in PATH for this session' }}

- name: GOPATH hint
  ansible.builtin.debug:
    msg: "GOPATH={{ ansible_facts.env.get('GOPATH', '(unset - open a new shell after tw-vm profile)') }}"

- name: MIME default for text/plain
  ansible.builtin.command:
    cmd: xdg-mime query default text/plain
  register: doctor_mime
  changed_when: false
  failed_when: false

- name: Show MIME default
  ansible.builtin.debug:
    var: doctor_mime.stdout
  when: doctor_mime.rc == 0

- name: Dotfile symlink sample check (packages/ + stown lists)
  ansible.builtin.shell: |
    set -euo pipefail
    root="$DOTFILES_PACKAGES_ROOT"
    found=0
    for pkg in $DOTFILES_STOWN_PKGS; do
      [[ -d "$root/$pkg" ]] || continue
      prefix="${root}/${pkg}/"
      while IFS= read -r -d '' f; do
        rel="${f#$prefix}"
        target="$HOME/$rel"
        if [[ -L "$target" ]]; then echo "OK link $target"; found=1
        elif [[ -e "$target" ]]; then echo "FILE $target (not symlink)"
        else echo "MISS $target"; fi
        if [[ $found -ge 5 ]]; then break 2; fi
      done < <(find "$root/$pkg" -type f -print0 | head -z -n 24)
    done
  args:
    executable: /bin/bash
  environment:
    DOTFILES_PACKAGES_ROOT: "{{ dotfiles_packages_root }}"
    DOTFILES_STOWN_PKGS: "{{ (stown_packages_tw_vm + stown_packages_arch) | unique | join(' ') }}"
  register: doctor_links
  changed_when: false
  failed_when: false

- name: Show dotfile link sample
  ansible.builtin.debug:
    var: doctor_links.stdout_lines
