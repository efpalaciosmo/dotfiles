---
- name: Arch packages (home)
  tags: [home, packages-home]
  block:
    - name: Require Arch Linux home profile
      ansible.builtin.assert:
        that:
          - ansible_facts.distribution == 'Archlinux'
        fail_msg: "The home profile now expects Arch Linux. Detected: {{ ansible_facts.distribution }}."
        quiet: true

    - name: Require pacman
      ansible.builtin.command:
        argv:
          - pacman
          - --version
      changed_when: false

    - name: Upgrade Arch system packages
      community.general.pacman:
        update_cache: true
        upgrade: true
      become: true

    - name: Install Arch home packages
      community.general.pacman:
        name: "{{ home_pacman_packages }}"
        state: present
        reason: explicit
        reason_for: new
      become: true

    - name: Enable Bluetooth service
      ansible.builtin.systemd_service:
        name: bluetooth.service
        enabled: true
        state: started
      become: true

    - name: Verify Arch home packages
      ansible.builtin.command:
        cmd: pacman -Q "{{ item }}"
      loop: "{{ home_pacman_packages }}"
      register: pacman_q_home
      changed_when: false
      failed_when: pacman_q_home.rc != 0
