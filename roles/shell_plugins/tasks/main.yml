---
- name: Shell plugins
  tags: [tw-vm, arch, shell-plugins-tw-vm, shell-plugins-arch]
  when: not ansible_check_mode
  block:
    - name: Require zsh
      ansible.builtin.shell:
        cmd: command -v zsh
      changed_when: false

    - name: Install oh-my-zsh (keep existing zshrc)
      ansible.builtin.shell: |
        env CHSH=no RUNZSH=no KEEP_ZSHRC=yes \
          sh -c 'curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh | sh -s -- --unattended --keep-zshrc'
      args:
        creates: "{{ zsh_dir }}"
      changed_when: true

    - name: Ensure custom plugins directory
      ansible.builtin.file:
        path: "{{ zsh_custom }}/plugins"
        state: directory
        mode: '0755'

    - name: zsh-autosuggestions plugin
      ansible.builtin.git:
        repo: https://github.com/zsh-users/zsh-autosuggestions
        dest: "{{ zsh_custom }}/plugins/zsh-autosuggestions"
        depth: 1

    - name: zsh-syntax-highlighting plugin
      ansible.builtin.git:
        repo: https://github.com/zsh-users/zsh-syntax-highlighting
        dest: "{{ zsh_custom }}/plugins/zsh-syntax-highlighting"
        depth: 1
