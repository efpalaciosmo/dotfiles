---
- name: Shell plugins
  tags: [shell]
  when: not ansible_check_mode
  block:
    - name: Require zsh
      ansible.builtin.shell:
        cmd: command -v zsh
      changed_when: false

    - name: Install oh-my-zsh
      ansible.builtin.git:
        repo: https://github.com/ohmyzsh/ohmyzsh.git
        dest: "{{ zsh_dir }}"
        depth: 1

    - name: Ensure custom plugins directory
      ansible.builtin.file:
        path: "{{ zsh_custom }}/plugins"
        state: directory
        mode: '0755'

    - name: zsh-autosuggestions plugin
      ansible.builtin.git:
        repo: https://github.com/zsh-users/zsh-autosuggestions
        dest: "{{ zsh_custom }}/plugins/zsh-autosuggestions"
        depth: 1

    - name: zsh-syntax-highlighting plugin
      ansible.builtin.git:
        repo: https://github.com/zsh-users/zsh-syntax-highlighting
        dest: "{{ zsh_custom }}/plugins/zsh-syntax-highlighting"
        depth: 1
