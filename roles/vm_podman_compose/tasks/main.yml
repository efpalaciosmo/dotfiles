---
- name: podman-compose
  tags: [suse, podman-compose]
  block:
    - name: Install podman-compose (pip --user)
      ansible.builtin.include_tasks: "{{ playbook_dir }}/tasks/pip_user_install.yml"
      vars:
        pip_install_pkg: podman-compose
      when: not ansible_check_mode

    - name: Verify podman-compose
      ansible.builtin.command:
        cmd: bash -lc 'command -v podman-compose'
      environment:
        PATH: "{{ ansible_facts.env.HOME }}/.local/bin:{{ ansible_facts.env.PATH | default('') }}"
      register: _podman_compose_verify
      when: not ansible_check_mode
      changed_when: false
      failed_when: _podman_compose_verify.rc != 0
