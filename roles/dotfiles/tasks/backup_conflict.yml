---
# _leaf = source file under package; stown_pkg_dir = package root directory
- name: Relative path under package
  ansible.builtin.set_fact:
    _rel_under_pkg: "{{ _leaf | regex_replace('^' ~ (stown_pkg_dir | regex_escape) ~ '/', '') }}"

- name: Target path under HOME
  ansible.builtin.set_fact:
    _home_target: "{{ ansible_env.HOME }}/{{ _rel_under_pkg }}"

- name: Stat home target
  ansible.builtin.stat:
    path: "{{ _home_target }}"
    follow: false
  register: _ht

- name: Canonical source path
  ansible.builtin.command:
    cmd: readlink -f "{{ _leaf }}"
  register: _src_canon
  changed_when: false
  failed_when: false

- name: Canonical destination path
  ansible.builtin.command:
    cmd: readlink -f "{{ _home_target }}"
  register: _dst_canon
  changed_when: false
  failed_when: false
  when: _ht.stat.exists | default(false) or (_ht.stat.islnk | default(false))

- name: Decide if backup is needed
  ansible.builtin.set_fact:
    _need_backup: >-
      {{
        (
          (_ht.stat.islnk | default(false))
          and (
            (_dst_canon.stdout | default('')) != (_src_canon.stdout | default(''))
          )
        )
        or (
          (_ht.stat.exists | default(false))
          and not (_ht.stat.islnk | default(false))
        )
      }}

- name: Ensure backup parent directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.dotfiles-backup/{{ dotfiles_backup_stamp }}/{{ _rel_under_pkg | dirname }}"
    state: directory
    mode: '0755'
  when: _need_backup | bool

- name: Move conflicting path to backup tree
  ansible.builtin.command:
    cmd: mv "{{ _home_target }}" "{{ ansible_env.HOME }}/.dotfiles-backup/{{ dotfiles_backup_stamp }}/{{ _rel_under_pkg }}"
  when: _need_backup | bool
  changed_when: true
