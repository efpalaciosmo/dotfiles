---
# stown_pkg_dir = absolute path to package (e.g. .../packages/starship)
- name: Find files under package
  ansible.builtin.find:
    paths: "{{ stown_pkg_dir }}"
    recurse: true
    file_type: file
    hidden: true
  register: _dotfiles_pkg_files

- name: Filter ignored paths for stown preflight
  ansible.builtin.set_fact:
    _leaves: >-
      {{
        _dotfiles_pkg_files.files
        | map(attribute='path')
        | reject('search', dotfiles_ignore_regex)
        | list
      }}

# Without this, stown "tree-folds" any directory whose target does not yet
# exist (e.g. ~/.config), creating a single symlink to the package's subdir.
# When a later package shares the same parent, --force makes it overwrite the
# previous symlink, so the last package effectively claims the whole tree
# (e.g. ~/.config ends up pointing at a single package's .config/ alone).
# Pre-creating every directory the package contributes guarantees stown only
# folds leaf files, keeping ~/.config and friends real directories.
- name: Find directories under package (defeat stown tree-folding)
  ansible.builtin.find:
    paths: "{{ stown_pkg_dir }}"
    recurse: true
    file_type: directory
    hidden: true
  register: _dotfiles_pkg_dirs

- name: Pre-create matching directories under HOME
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/{{ item }}"
    state: directory
    mode: '0755'
  loop: >-
    {{
      _dotfiles_pkg_dirs.files
      | map(attribute='path')
      | reject('search', dotfiles_ignore_regex)
      | map('regex_replace', '^' ~ (stown_pkg_dir | regex_escape) ~ '/', '')
      | reject('equalto', '')
      | list
    }}

- name: Prepare backup root
  ansible.builtin.file:
    path: "{{ ansible_facts.env.HOME }}/.dotfiles-backup/{{ dotfiles_backup_stamp }}"
    state: directory
    mode: '0755'

- name: Check each target for conflicts
  ansible.builtin.include_tasks: backup_conflict.yml
  loop: "{{ _leaves }}"
  loop_control:
    loop_var: _leaf

- name: Run stown for package
  ansible.builtin.command:
    argv:
      - stown
      - --force
      - --ignore
      - "{{ dotfiles_ignore_regex }}"
      - "{{ ansible_facts.env.HOME }}"
      - "{{ stown_pkg_dir }}"
  environment:
    PATH: "{{ ansible_facts.env.HOME }}/.local/bin:{{ ansible_facts.env.PATH | default('') }}"
  register: _stown_out
  changed_when: _stown_out.rc == 0
  failed_when: _stown_out.rc != 0
