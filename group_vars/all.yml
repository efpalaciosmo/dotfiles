---
dotfiles_repo_root: "{{ playbook_dir }}"
dotfiles_packages_root: "{{ playbook_dir }}/packages"

stown_packages:
  - git
  - shell-container
  - starship
  - nvim-vm

brew_expected_commands:
  - brew
  - bash
  - zsh
  - git
  - gh
  - make
  - cmake
  - ninja
  - pkgconf
  - curl
  - wget
  - unzip
  - xz
  - jq
  - tree
  - fd
  - rg
  - fzf
  - bat
  - btop
  - duf
  - ncdu
  - tmux
  - fastfetch
  - nvim
  - tree-sitter
  - lua
  - stylua
  - uv
  - fnm
  - juliaup
  - pnpm
  - go
  - rustup
  - cargo
  - rustc
  - zig
  - clang
  - java
  - gradle
  - starship
  - stow

pnpm_home: "{{ ansible_facts.env.PNPM_HOME | default(ansible_facts.env.HOME + '/.local/share/pnpm') }}"
node_user_tools_packages:
  - typescript

nerd_fonts_version: v3.4.0
nerd_fonts_base_url: "https://github.com/ryanoasis/nerd-fonts/releases/download/{{ nerd_fonts_version }}"
nerd_fonts_list:
  - archive: IBMPlexMono.tar.xz
    subdir: IBMPlexMono
  - archive: JetBrainsMono.tar.xz
    subdir: JetBrainsMono
  - archive: Inter-4.1.zip
    subdir: Inter
    version: v4.1
    url: https://github.com/rsms/inter/releases/download/v4.1/Inter-4.1.zip
nerd_fonts_root: "{{ ansible_facts.env.HOME }}/.local/share/fonts/nerd-fonts"
nerd_fonts_cache_dir: "{{ ansible_facts.env.XDG_CACHE_HOME | default(ansible_facts.env.HOME + '/.cache') }}/dotfiles/nerd-fonts/{{ nerd_fonts_version }}"

nvim_treesitter_installer_repo: https://github.com/nvim-treesitter/nvim-treesitter
nvim_treesitter_installer_version: 4916d6592ede8c07973490d9322f187e07dfefac
nvim_treesitter_cache_dir: "{{ ansible_facts.env.XDG_CACHE_HOME | default(ansible_facts.env.HOME + '/.cache') }}/dotfiles/nvim-treesitter"
nvim_treesitter_checkout_dir: "{{ nvim_treesitter_cache_dir }}/nvim-treesitter"
nvim_treesitter_bin_dir: "{{ nvim_treesitter_cache_dir }}/bin"
nvim_treesitter_install_jobs: 4
nvim_treesitter_install_timeout_ms: 900000
nvim_treesitter_parser_languages:
  - lua
  - vim
  - vimdoc
  - query
  - bash
  - python
  - zig
  - c
  - cpp
  - javascript
  - typescript
  - tsx
  - jsdoc
  - html
  - css
  - scss
  - json
  - yaml
  - toml
  - julia
  - sql
  - markdown
  - markdown_inline
  - typst
  - regex
  - diff
  - gitcommit

allow_pip_break_system_packages: true
pip_break_allowed: >-
  {{
    (allow_pip_break_system_packages | bool)
    or (lookup('env', 'ALLOW_PIP_BREAK_SYSTEM_PACKAGES', default='0') == '1')
  }}

zsh_dir: "{{ ansible_facts.env.ZSH | default(ansible_facts.env.HOME + '/.oh-my-zsh') }}"
zsh_custom: "{{ ansible_facts.env.ZSH_CUSTOM | default(zsh_dir + '/custom') }}"

rustup_installer_url: https://sh.rustup.rs
rustup_default_toolchain: stable
cargo_home: "{{ ansible_facts.env.CARGO_HOME | default(ansible_facts.env.HOME + '/.cargo') }}"
rustup_home: "{{ ansible_facts.env.RUSTUP_HOME | default(ansible_facts.env.HOME + '/.rustup') }}"

dotfiles_ignore_regex: '(^|/)(\.git|\.gitkeep|\.DS_Store|README\.md|README|.*\.md\.template)$'
