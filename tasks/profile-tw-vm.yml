---
# Tumbleweed Distrobox profile (manually entered).
# Order: common -> system packages (zypper) -> python user tools (pip + stown)
# -> fonts -> VS Code Insiders -> language runtimes -> starship -> shell
# plugins -> stown apply -> podman-compose (pip-based, runs last).

- name: Common setup
  ansible.builtin.import_role:
    name: common
  tags: [always, common, tw-vm]

- name: Tumbleweed packages (zypper)
  ansible.builtin.import_role:
    name: vm_packages
  tags: [packages-tw-vm, tw-vm]

- name: Python user tools (pip, stown)
  ansible.builtin.import_role:
    name: python_user_tools
  tags: [python-user-tools, tw-vm]

- name: Nerd Fonts (vm)
  ansible.builtin.import_role:
    name: fonts
  tags: [fonts-tw-vm, tw-vm]

- name: VS Code Insiders
  ansible.builtin.import_role:
    name: vm_vscode
  tags: [vscode-insiders, tw-vm]

- name: Languages / runtimes
  ansible.builtin.import_role:
    name: vm_languages
  tags: [languages-tw-vm, tw-vm]

- name: Starship (prompt)
  ansible.builtin.import_role:
    name: starship
  tags: [starship-tw-vm, tw-vm]

- name: Shell plugins (oh-my-zsh)
  ansible.builtin.import_role:
    name: shell_plugins
  tags: [shell-plugins-tw-vm, tw-vm]

- name: Apply dotfiles with stown
  ansible.builtin.import_role:
    name: dotfiles
  vars:
    stown_profile: tw-vm
  tags: [stown-tw-vm, tw-vm]

- name: podman-compose (pip --user)
  ansible.builtin.import_role:
    name: vm_podman_compose
  tags: [podman-compose, tw-vm]
