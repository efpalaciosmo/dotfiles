---
# `dotfiles_in_distrobox` is set in role `common`; run it before guards that use it.
- name: Common setup
  ansible.builtin.import_role:
    name: common
  tags: [always, common, home]

# `always`: run on partial home runs (e.g. `make fonts-home` uses only `--tags fonts-home`).
- name: Home profile guard (Arch host)
  tags: [always, home]
  block:
    - name: Fail if running inside Distrobox
      ansible.builtin.fail:
        msg: "Run the home profile on the host, not inside distrobox."
      when: dotfiles_in_distrobox | bool

- name: Arch packages (host)
  ansible.builtin.import_role:
    name: home_packages
  tags: [packages-home, home]

- name: Nerd Fonts (host)
  ansible.builtin.import_role:
    name: fonts
  tags: [fonts-home, home]

# Only distrobox + flatpaks here — do not add umbrella `home` or partial runs that pass
# `--tags home` by mistake would pull in Flatpak (needs community.general).
- name: Distrobox and Flatpaks (host)
  ansible.builtin.import_role:
    name: home
  tags: [distrobox, flatpaks]

- name: Python user tools (pip, stown)
  ansible.builtin.import_role:
    name: python_user_tools
  tags: [python-user-tools, home]

- name: Language tools (host)
  ansible.builtin.import_role:
    name: home_languages
  tags: [languages-home, language-home, home]

- name: Starship prompt (host)
  ansible.builtin.import_role:
    name: vm_starship
  tags: [starship-home, home]

- name: Zsh plugins (host)
  ansible.builtin.import_role:
    name: vm_shell_plugins
  tags: [shell-plugins-home, home]

- name: Apply dotfiles with stown
  ansible.builtin.import_role:
    name: dotfiles
  vars:
    stown_profile: home
  tags: [stown-home, home]
