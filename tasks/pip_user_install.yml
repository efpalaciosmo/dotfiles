---
# Shared `pip --user -U <pkg>` with PEP 668 retry. Inputs:
#   pip_install_pkg  - distribution name (e.g. "stown")
#   pip_install_label - human label used in registered fact suffix (defaults to pkg)
#
# Idempotent: pip itself reports "Successfully installed" only on actual install/upgrade.
- name: "pip --user -U {{ pip_install_pkg }}"
  ansible.builtin.command:
    argv:
      - "{{ dotfiles_pip_python | default('python3') }}"
      - -m
      - pip
      - install
      - --user
      - -U
      - "{{ pip_install_pkg }}"
  register: _pip_install
  changed_when: "'Successfully installed' in _pip_install.stdout"
  failed_when: false

- name: "pip --user --break-system-packages -U {{ pip_install_pkg }} (retry)"
  ansible.builtin.command:
    argv:
      - "{{ dotfiles_pip_python | default('python3') }}"
      - -m
      - pip
      - install
      - --user
      - -U
      - "--break-system-packages"
      - "{{ pip_install_pkg }}"
  register: _pip_install_retry
  changed_when: "'Successfully installed' in _pip_install_retry.stdout"
  when:
    - _pip_install.rc != 0
    - pip_break_allowed | bool
  failed_when: _pip_install_retry.rc != 0

- name: "Fail if {{ pip_install_pkg }} install did not succeed"
  ansible.builtin.assert:
    that:
      - (_pip_install.rc | default(1)) == 0
        or ((_pip_install_retry.rc | default(1)) == 0)
    fail_msg: >-
      pip install --user {{ pip_install_pkg }} failed. If this is a PEP 668 host,
      re-run with ALLOW_PIP_BREAK_SYSTEM_PACKAGES=1 (or set
      allow_pip_break_system_packages: true in group_vars/all.yml).
    quiet: true
