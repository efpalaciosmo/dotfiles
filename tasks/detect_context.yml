---
# Shared environment detection used by both the common role and the doctor playbook.
# Sets:
#   dotfiles_in_distrobox  - Heuristic: is this run inside Distrobox / podman user container?
#   dotfiles_is_ostree_host - Is this a /run/ostree-booted host?
- name: Stat container env file
  ansible.builtin.stat:
    path: /run/.containerenv
  register: _ctx_containerenv

- name: Stat /run/host (distrobox hint)
  ansible.builtin.stat:
    path: /run/host
  register: _ctx_run_host

- name: Stat ostree-booted marker
  ansible.builtin.stat:
    path: /run/ostree-booted
  register: _ctx_ostree

- name: Set dotfiles context facts
  ansible.builtin.set_fact:
    dotfiles_is_ostree_host: "{{ _ctx_ostree.stat.exists | default(false) }}"
    dotfiles_in_distrobox: >-
      {{
        (_ctx_containerenv.stat.exists | default(false))
        or (_ctx_run_host.stat.exists | default(false))
        or (ansible_env.get('DISTROBOX_ENTER_PATH', '') | length > 0)
        or (ansible_env.get('CONTAINER_ID', '') | length > 0)
      }}
