---
# Arch Linux host profile.
# Order: common -> system packages (pacman) -> python user tools (pip + stown)
# -> fonts -> language tools -> starship -> shell plugins -> stown apply.
#
# Rationale: pacman installs python/base-devel; python_user_tools then bootstraps
# pip --user and stown so every later step (and the final stown apply) has them.

# Arch ships an externally-managed Python (PEP 668). The shared
# python_user_tools role uses pip --user to install stown, so we enable the
# --break-system-packages retry by default for this profile.
- name: Allow pip --break-system-packages on Arch (PEP 668)
  ansible.builtin.set_fact:
    allow_pip_break_system_packages: true
  tags: [always, arch]

- name: Common setup
  ansible.builtin.import_role:
    name: common
  tags: [always, common, arch]

- name: Arch packages (pacman)
  ansible.builtin.import_role:
    name: arch_packages
  tags: [packages-arch, arch]

- name: Python user tools (pip, stown)
  ansible.builtin.import_role:
    name: python_user_tools
  tags: [python-user-tools, arch]

- name: Nerd Fonts (host)
  ansible.builtin.import_role:
    name: fonts
  tags: [fonts-arch, arch]

- name: Language tools (host)
  ansible.builtin.import_role:
    name: home_languages
  tags: [languages-arch, language-arch, arch]

- name: Starship prompt (host)
  ansible.builtin.import_role:
    name: starship
  tags: [starship-arch, arch]

- name: Zsh plugins (host)
  ansible.builtin.import_role:
    name: shell_plugins
  tags: [shell-plugins-arch, arch]

- name: Apply dotfiles with stown
  ansible.builtin.import_role:
    name: dotfiles
  vars:
    stown_profile: arch
  tags: [stown-arch, arch]
